# lab_dir8.yaml
# =============
# Place this file in:  bci_raspy/SJtools/copilot/targets/lab_dir8.yaml
#
# 8-direction centre-out target configuration calibrated for your lab.
# Target positions are in normalised [-1, 1] space (same convention as
# the SJ_4_directions constructor).
#
# Your CSV targets lie on a circle of radius 432 px.
# Normalised positions = pixel_position / 432.
#
# Target size 0.15 (in normalised units) was chosen to match the
# dir-8-close.yaml used in run.sh (which proved effective at ~90% success).
# Adjust 'size' if your on-screen target radius differs.
#
# Target name → arm label mapping (from online_arm_trajectories.csv README):
#   nw = label 0  (-0.707,  0.707)
#   n  = label 1  ( 0.000,  1.000)
#   ne = label 2  ( 0.707,  0.707)
#   e  = label 3  ( 1.000,  0.000)
#   se = label 4  ( 0.707, -0.707)
#   s  = label 5  ( 0.000, -1.000)
#   sw = label 6  (-0.707, -0.707)
#   w  = label 7  (-1.000,  0.000)

targetsInfo:
  nw: [[-0.707,  0.707], [0.15, 0.15]]
  n:  [[ 0.000,  1.000], [0.15, 0.15]]
  ne: [[ 0.707,  0.707], [0.15, 0.15]]
  e:  [[ 1.000,  0.000], [0.15, 0.15]]
  se: [[ 0.707, -0.707], [0.15, 0.15]]
  s:  [[ 0.000, -1.000], [0.15, 0.15]]
  sw: [[-0.707, -0.707], [0.15, 0.15]]
  w:  [[-1.000,  0.000], [0.15, 0.15]]
  still: still
